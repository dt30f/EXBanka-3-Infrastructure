apiVersion: apps/v1
kind: Deployment
metadata:
  name: mailhog
  namespace: exbanka
  labels:
    app.kubernetes.io/name: mailhog
    app.kubernetes.io/part-of: exbanka
    app.kubernetes.io/component: dev-smtp
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mailhog
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mailhog
        app.kubernetes.io/part-of: exbanka
    spec:
      containers:
        - name: mailhog
          image: mailhog/mailhog:v1.0.1
          imagePullPolicy: IfNotPresent
          ports:
            - name: smtp
              containerPort: 1025
            - name: web
              containerPort: 8025
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: mailhog
  namespace: exbanka
  labels:
    app.kubernetes.io/name: mailhog
    app.kubernetes.io/part-of: exbanka
    app.kubernetes.io/component: dev-smtp
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: mailhog
  ports:
    - name: smtp
      port: 1025
      targetPort: smtp
    - name: web
      port: 8025
      targetPort: web
