apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: exbanka
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: exbanka
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: backend
  ports:
    - name: http
      port: 8080
      targetPort: http
    - name: grpc
      port: 9090
      targetPort: grpc
